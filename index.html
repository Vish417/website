<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takkt Agentforce Test Page</title>
<style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      padding: 50px;
      text-align: center;
    }
    .embeddedServiceSidebar.layout-docked .dockableContainer {      height: 600px !important;    }
</style>
</head>
<body>
 
  <h1>Takkt Product Assistant</h1>
<p>Click the chat icon in the bottom right to talk to Agentforce.</p>
 
  <script type='text/javascript'>
    function initEmbeddedMessaging() {
      try {
        embeddedservice_bootstrap.settings.language = 'de';
 
        embeddedservice_bootstrap.init(
          '00D9K00000L1UMb',
          'takkt_Github',
          'https://takkt-eu--integ.sandbox.my.site.com/ESWtakktGithub1777437432311',
          {
            scrt2URL: 'https://takkt-eu--integ.sandbox.my.salesforce-scrt.com'
          }
        );
 
        window.addEventListener('onEmbeddedMessagingReady', () => {          // ↓↓ ADDED — always open chat on load and save state ↓↓         
            embeddedservice_bootstrap.utilAPI.launchChat();          sessionStorage.setItem('chatOpen', 'true');  
            // Keep tracking if user minimizes/closes          
            window.addEventListener('onEmbeddedMessagingWindowMaximized', () => {            sessionStorage.setItem('chatOpen', 'true');          });          window.addEventListener('onEmbeddedMessagingWindowMinimized', () => {            sessionStorage.setItem('chatOpen', 'false');          });          // ↑↑ END OF ADDED CODE ↑↑        
        });
      } catch (err) {
        console.error('Error loading Embedded Messaging: ', err);
      }
    }
</script>
 
  <script
    type='text/javascript'
    src='https://takkt-eu--integ.sandbox.my.site.com/ESWtakktGithub1777437432311/assets/js/bootstrap.min.js'
    onload='initEmbeddedMessaging()'
></script>
 
</body>
</html>
